services:
  postgres:
    image: postgres:16-alpine
    container_name: clinic-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-clinic_management}
      POSTGRES_USER: ${POSTGRES_USER:-clinic_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:is required}
    ports:
      - "5432:5432"
    volumes:
      - clinic_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-clinic_app} -d ${POSTGRES_DB:-clinic_management}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clinic-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-clinic_management}
      DB_USERNAME: ${POSTGRES_USER:-clinic_app}
      DB_PASSWORD: ${POSTGRES_PASSWORD:is required}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  clinic_postgres_data:
